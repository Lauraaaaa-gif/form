<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>代送排單表</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #090b0f;
      --paper: #141821;
      --paper-2: #1b202b;
      --ink: #f6f2e8;
      --muted: #a8adb8;
      --line: #2b3240;
      --accent: #d9a441;
      --accent-2: #7dd3fc;
      --accent-dark: #f0c66a;
      --soft: #24202a;
      --danger: #f87171;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(217, 164, 65, 0.2), transparent 31rem),
        radial-gradient(circle at bottom right, rgba(125, 211, 252, 0.12), transparent 28rem),
        linear-gradient(135deg, #080a0f 0%, #111722 48%, #090b0f 100%);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .topbar {
      width: min(1060px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }

    .wrap {
      width: min(1060px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 42px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(280px, 0.9fr) minmax(300px, 420px);
      gap: 26px;
      align-items: center;
      min-height: calc(100vh - 118px);
    }

    .hero-copy {
      padding: 20px 4px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      color: var(--accent-dark);
      font-weight: 800;
      font-size: 14px;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 6px rgba(125, 211, 252, 0.12);
    }

    h1 {
      margin: 0;
      max-width: 10em;
      font-size: clamp(34px, 7vw, 64px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      max-width: 36em;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.75;
    }

    .form-panel,
    .admin-panel,
    .modal-card {
      background: linear-gradient(180deg, rgba(27, 32, 43, 0.96), rgba(16, 19, 27, 0.96));
      border: 1px solid rgba(217, 164, 65, 0.24);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .form-panel {
      overflow: hidden;
    }

    .panel-head {
      padding: 20px 22px 0;
    }

    h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.3;
    }

    .hint {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    form {
      padding: 18px 22px 22px;
    }

    label {
      display: block;
      margin-bottom: 13px;
      font-weight: 800;
      font-size: 14px;
    }

    input {
      width: 100%;
      height: 44px;
      margin-top: 7px;
      border: 1px solid #bdcbc6;
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--ink);
      background: #0d1118;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(217, 164, 65, 0.16);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 112px;
      gap: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      margin-top: 16px;
    }

    .download-link {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 9px 14px;
      background: rgba(217, 164, 65, 0.12);
      border: 1px solid rgba(217, 164, 65, 0.34);
      color: var(--accent-dark);
      font-weight: 800;
      text-decoration: none;
    }

    .download-link:hover {
      background: rgba(217, 164, 65, 0.2);
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      padding: 9px 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: #17120a;
      box-shadow: 0 14px 28px rgba(217, 164, 65, 0.24);
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      background: var(--soft);
      color: var(--accent-dark);
      border: 1px solid rgba(217, 164, 65, 0.2);
    }

    .ghost {
      background: rgba(20, 24, 33, 0.72);
      color: var(--accent-dark);
      border: 1px solid rgba(217, 164, 65, 0.28);
    }

    .danger {
      background: rgba(127, 29, 29, 0.32);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, 0.24);
    }

    .status {
      min-height: 24px;
      margin-top: 13px;
      color: var(--accent-dark);
      font-weight: 800;
      line-height: 1.5;
    }

    .admin-panel {
      display: none;
      margin-top: 22px;
      overflow: hidden;
    }

    .admin-panel.is-open {
      display: block;
    }

    .admin-head {
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .admin-body {
      padding: 18px 20px 22px;
    }

    .setup {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 16px;
    }

    .setup label {
      margin: 0;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      background: #10151e;
    }

    .metric strong {
      display: block;
      margin-bottom: 4px;
      font-size: 25px;
      line-height: 1;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.75fr;
      gap: 14px;
      align-items: start;
    }

    .admin-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #10151e;
    }

    .admin-box h3 {
      margin: 0;
      padding: 12px 14px;
      background: #171d28;
      font-size: 16px;
      border-bottom: 1px solid var(--line);
    }

    .table-wrap {
      overflow: auto;
      max-height: 390px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 610px;
      background: #10151e;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      position: sticky;
      top: 0;
      background: #1d2532;
      white-space: nowrap;
      z-index: 1;
    }

    td:last-child,
    th:last-child {
      text-align: right;
    }

    .empty {
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }

    .mini {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.58);
    }

    .modal.is-open {
      display: flex;
    }

    .modal-card {
      width: min(380px, 100%);
      padding: 22px;
    }

    .modal-card form {
      padding: 16px 0 0;
    }

    .modal-card .actions {
      justify-content: flex-end;
    }

    iframe {
      display: none;
    }

    @media (max-width: 860px) {
      .hero,
      .admin-grid,
      .setup {
        display: block;
      }

      .hero {
        min-height: 0;
      }

      .hero-copy {
        padding-top: 6px;
      }

      .form-panel,
      .admin-panel {
        margin-top: 18px;
      }

      .admin-box + .admin-box,
      .setup button {
        margin-top: 10px;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        padding-top: 12px;
      }

      .topbar button {
        width: 100%;
      }

      .wrap {
        width: min(100% - 22px, 1060px);
        padding-top: 10px;
      }

      .form-row,
      .summary {
        display: block;
      }

      .form-row label + label,
      .metric + .metric {
        margin-top: 10px;
      }

      .admin-head {
        display: block;
      }

      .admin-head .actions {
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="ghost" type="button" id="loginBtn">管理員登入</button>
    <button class="ghost" type="button" id="logoutBtn" hidden>登出</button>
  </div>

  <div class="wrap">
    <main class="hero">
      <section class="hero-copy" aria-label="活動資訊">
        <div class="eyebrow">BaiXi代送排單</div>
        <h1>第五人格代送</h1>
        <p class="lead">(製作者：Bai Xi)
請已付款的老闆幫我填寫以下資訊排單
未開放修改回覆 如有填錯也請不用擔心
稍後我會在聊天室與您核對(。•ω•。)ノ♡</p>
      </section>

      <section class="form-panel" aria-label="報名表">
        <div class="panel-head">
          <h2>填寫資料</h2>
          <p class="hint">每筆報名請確認資料無誤後再送出。</p>
        </div>
        <form id="entryForm" method="post" target="submitFrame">
          <label>FB名稱
            <input name="fbName" autocomplete="name" required>
          </label>
          <label>遊戲名稱
            <input name="gameName" required>
          </label>
          <label>UID
            <input name="uid" inputmode="numeric" required>
          </label>
          <div class="form-row">
            <label>商品名稱
              <input name="productName" required>
            </label>
            <label>數量
              <input name="quantity" type="number" inputmode="numeric" min="1" step="1" value="1" required>
            </label>
          </div>
          <input type="hidden" name="source" value="商品報名表">
          <button class="primary" type="submit">送出報名</button>
          <div class="status" id="status" role="status" aria-live="polite"></div>
        </form>
        <iframe name="submitFrame" title="送出結果"></iframe>
      </section>
    </main>

    <section class="admin-panel" id="adminPanel" aria-label="管理區">
        <div class="admin-head">
          <div>
            <h2>管理統計</h2>
            <p class="hint">此區需登入後才會顯示，用來設定試算表、查看本機紀錄與匯出資料。</p>
          </div>
          <div class="actions">
            <button class="secondary" type="button" id="exportBtn">匯出 Excel CSV</button>
          </div>
        </div>

      <div class="admin-body">
        <div class="setup">
          <label>Apps Script Web App URL
            <input id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
          </label>
          <button class="secondary" type="button" id="saveUrlBtn">儲存連結</button>
        </div>
        <div class="status" id="adminStatus" role="status" aria-live="polite"></div>
        <div class="actions" id="downloadArea" style="display:none;"></div>
        <p class="mini">未填 URL 時，資料只會存在這台裝置；填入 URL 後，資料會同步寫入 Google 試算表。</p>

        <div class="summary" style="margin-top:16px;">
          <div class="metric">
            <strong id="entryCount">0</strong>
            <span>報名筆數</span>
          </div>
          <div class="metric">
            <strong id="totalQty">0</strong>
            <span>總數量</span>
          </div>
          <div class="metric">
            <strong id="productCount">0</strong>
            <span>商品種類</span>
          </div>
        </div>

        <div class="actions" style="margin-bottom:14px;">
          <button class="ghost" type="button" id="clearFormBtn">清空表單</button>
          <button class="danger" type="button" id="clearDataBtn">清除本機資料</button>
        </div>

        <div class="admin-grid">
          <div class="admin-box">
            <h3>本機紀錄</h3>
            <div class="table-wrap" id="tableArea"></div>
          </div>
          <div class="admin-box">
            <h3>商品小計</h3>
            <div class="table-wrap" id="summaryArea"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="modal" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <div class="modal-card">
      <h2 id="loginTitle">管理登入</h2>
      <p class="hint">登入後可查看統計、設定試算表連結與匯出資料。</p>
      <form id="loginForm">
        <label>帳號
          <input id="adminUser" autocomplete="username" required>
        </label>
        <label>密碼
          <input id="adminPass" type="password" autocomplete="current-password" required>
        </label>
        <div class="status" id="loginStatus" role="status" aria-live="polite"></div>
        <div class="actions">
          <button class="ghost" type="button" id="closeLoginBtn">取消</button>
          <button class="primary" type="submit">登入</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const adminUsername = "admin";
    const adminPassword = "123456";
    const storageKey = "product_registration_entries_v1";
    const scriptUrlKey = "product_registration_script_url_v1";
    const adminSessionKey = "product_registration_admin_session_v1";
    const defaultScriptUrl = "https://script.google.com/macros/s/AKfycbyfI2AXLe2brLV0OnFhRlJJRxw3o4NRv49CrQPjV1FvRoPMfvbdUrDTcoPYHOkF1t5P/exec";

    const form = document.getElementById("entryForm");
    const statusEl = document.getElementById("status");
    const scriptUrlEl = document.getElementById("scriptUrl");
    const tableArea = document.getElementById("tableArea");
    const summaryArea = document.getElementById("summaryArea");
    const adminPanel = document.getElementById("adminPanel");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginModal = document.getElementById("loginModal");
    const loginForm = document.getElementById("loginForm");
    const loginStatus = document.getElementById("loginStatus");
    const adminStatus = document.getElementById("adminStatus");
    const downloadArea = document.getElementById("downloadArea");

    let entries = readEntries();
    let isAdmin = sessionStorage.getItem(adminSessionKey) === "yes";
    let currentDownloadUrl = "";

    function readEntries() {
      try {
        return JSON.parse(localStorage.getItem(storageKey) || "[]");
      } catch (error) {
        return [];
      }
    }

    function saveEntries() {
      localStorage.setItem(storageKey, JSON.stringify(entries));
    }

    function sanitize(value) {
      return String(value || "").trim();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? "var(--danger)" : "var(--accent-dark)";
    }

    function setLoginStatus(message, isError = false) {
      loginStatus.textContent = message;
      loginStatus.style.color = isError ? "var(--danger)" : "var(--accent-dark)";
    }

    function setAdminStatus(message, isError = false) {
      adminStatus.textContent = message;
      adminStatus.style.color = isError ? "var(--danger)" : "var(--accent-dark)";
    }

    function getConfiguredScriptUrl() {
      const params = new URLSearchParams(location.search);
      const sharedUrl = params.get("scriptUrl");

      if (sharedUrl) {
        localStorage.setItem(scriptUrlKey, sharedUrl);
        return sharedUrl;
      }

      return localStorage.getItem(scriptUrlKey) || defaultScriptUrl;
    }

    function applyScriptUrl() {
      const url = getConfiguredScriptUrl();
      scriptUrlEl.value = url;
      if (url) {
        form.action = url;
      } else {
        form.removeAttribute("action");
      }
    }

    function setAdminVisible(visible) {
      isAdmin = visible;
      adminPanel.classList.toggle("is-open", visible);
      loginBtn.hidden = visible;
      logoutBtn.hidden = !visible;

      if (visible) {
        sessionStorage.setItem(adminSessionKey, "yes");
      } else {
        sessionStorage.removeItem(adminSessionKey);
      }
    }

    function openLogin() {
      loginModal.classList.add("is-open");
      setLoginStatus("");
      document.getElementById("adminUser").focus();
    }

    function closeLogin() {
      loginModal.classList.remove("is-open");
      loginForm.reset();
      setLoginStatus("");
    }

    function render() {
      const totalQty = entries.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
      const products = new Map();

      entries.forEach(item => {
        const key = item.productName || "未填商品";
        products.set(key, (products.get(key) || 0) + Number(item.quantity || 0));
      });

      document.getElementById("entryCount").textContent = entries.length;
      document.getElementById("totalQty").textContent = totalQty;
      document.getElementById("productCount").textContent = products.size;

      if (!entries.length) {
        tableArea.innerHTML = '<div class="empty">尚無報名資料</div>';
      } else {
        tableArea.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>時間</th>
                <th>FB名稱</th>
                <th>遊戲名稱</th>
                <th>UID</th>
                <th>商品名稱</th>
                <th>數量</th>
              </tr>
            </thead>
            <tbody>
              ${entries.slice().reverse().map(item => `
                <tr>
                  <td>${escapeHtml(item.createdAt)}</td>
                  <td>${escapeHtml(item.fbName)}</td>
                  <td>${escapeHtml(item.gameName)}</td>
                  <td>${escapeHtml(item.uid)}</td>
                  <td>${escapeHtml(item.productName)}</td>
                  <td>${escapeHtml(item.quantity)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      }

      if (!products.size) {
        summaryArea.innerHTML = '<div class="empty">尚無商品統計</div>';
      } else {
        const rows = Array.from(products.entries()).sort((a, b) => b[1] - a[1]);
        summaryArea.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>商品名稱</th>
                <th>數量小計</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(([name, qty]) => `
                <tr>
                  <td>${escapeHtml(name)}</td>
                  <td>${escapeHtml(qty)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      }
    }

    function toCsv(rows) {
      return rows.map(row => row.map(value => {
        const cell = String(value ?? "");
        return `"${cell.replace(/"/g, '""')}"`;
      }).join(",")).join("\n");
    }

    function exportCsv() {
      if (!entries.length) {
        setAdminStatus("目前沒有可匯出的本機資料。", true);
        downloadArea.style.display = "none";
        downloadArea.innerHTML = "";
        alert("目前沒有可匯出的本機資料。");
        return;
      }

      const rows = [
        ["時間", "FB名稱", "遊戲名稱", "UID", "商品名稱", "數量"],
        ...entries.map(item => [item.createdAt, item.fbName, item.gameName, item.uid, item.productName, item.quantity])
      ];
      const blob = new Blob(["\ufeff" + toCsv(rows)], { type: "text/csv;charset=utf-8" });
      if (currentDownloadUrl) {
        URL.revokeObjectURL(currentDownloadUrl);
      }
      const url = URL.createObjectURL(blob);
      currentDownloadUrl = url;
      const fileName = `商品報名統計_${new Date().toISOString().slice(0, 10)}.csv`;
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      a.remove();
      downloadArea.style.display = "flex";
      downloadArea.innerHTML = `<a class="download-link" href="${url}" download="${fileName}">點此下載 CSV</a>`;
      setAdminStatus("CSV 已產生。若沒有自動下載，請點下方連結。");
    }

    function submitToGoogleSheet(item) {
      const syncForm = document.createElement("form");
      syncForm.method = "post";
      syncForm.action = form.action;
      syncForm.target = "submitFrame";
      syncForm.style.display = "none";

      const payload = {
        fbName: item.fbName,
        gameName: item.gameName,
        uid: item.uid,
        productName: item.productName,
        quantity: item.quantity,
        source: "第五排單"
      };

      Object.entries(payload).forEach(([name, value]) => {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = name;
        input.value = value;
        syncForm.appendChild(input);
      });

      document.body.appendChild(syncForm);
      syncForm.submit();
      window.setTimeout(() => syncForm.remove(), 1000);
    }

    form.addEventListener("submit", event => {
      event.preventDefault();
      const data = new FormData(form);
      const item = {
        createdAt: new Date().toLocaleString("zh-TW", { hour12: false }),
        fbName: sanitize(data.get("fbName")),
        gameName: sanitize(data.get("gameName")),
        uid: sanitize(data.get("uid")),
        productName: sanitize(data.get("productName")),
        quantity: Math.max(1, Number(data.get("quantity") || 1))
      };

      entries.push(item);
      saveEntries();
      render();

      if (!form.action) {
        setStatus("已送出。管理者尚未設定線上試算表，目前先儲存在本機。");
        setAdminStatus("已新增一筆本機資料。");
      } else {
        submitToGoogleSheet(item);
        setStatus("已送出報名，謝謝。");
        setAdminStatus("已新增一筆本機資料，並送往 Google 試算表。");
      }

      form.reset();
      form.quantity.value = 1;
    });

    loginBtn.addEventListener("click", openLogin);
    document.getElementById("closeLoginBtn").addEventListener("click", closeLogin);
    loginModal.addEventListener("click", event => {
      if (event.target === loginModal) closeLogin();
    });

    loginForm.addEventListener("submit", event => {
      event.preventDefault();
      const user = sanitize(document.getElementById("adminUser").value);
      const pass = document.getElementById("adminPass").value;

      if (user === adminUsername && pass === adminPassword) {
        setAdminVisible(true);
        closeLogin();
      } else {
        setLoginStatus("帳號或密碼錯誤。", true);
      }
    });

    logoutBtn.addEventListener("click", () => {
      setAdminVisible(false);
      setStatus("");
    });

    document.getElementById("saveUrlBtn").addEventListener("click", () => {
      const url = sanitize(scriptUrlEl.value);
      localStorage.setItem(scriptUrlKey, url);
      applyScriptUrl();
      setAdminStatus(url ? "已儲存線上試算表連結。" : "已清除線上連結。");
    });

    document.getElementById("exportBtn").addEventListener("click", exportCsv);

    document.getElementById("clearFormBtn").addEventListener("click", () => {
      form.reset();
      form.quantity.value = 1;
      setAdminStatus("表單已清空。");
    });

    document.getElementById("clearDataBtn").addEventListener("click", () => {
      if (!confirm("確定要清除這台裝置上的本機紀錄嗎？Google 試算表資料不會被刪除。")) return;
      entries = [];
      saveEntries();
      render();
      setAdminStatus("本機紀錄已清除。");
    });

    applyScriptUrl();
    render();
    setAdminVisible(isAdmin);
  </script>
</body>
</html>
